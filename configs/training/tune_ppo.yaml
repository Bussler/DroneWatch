training:
  stop:
    iterations: 10
  ray:
    num_env_runners: 0
    num_envs_per_env_runner: 1
    num_learners: 0
    num_gpus_per_learner: 0
  ppo:
    gamma: 0.99
    lambda_: 0.95
    lr: 0.0003
    clip_param: 0.2
    grad_clip: 0.5
    entropy_coeff: 0.001
    vf_loss_coeff: 1.0
    train_batch_size_per_learner: 512
    minibatch_size: 128
    num_epochs: 3
    rollout_fragment_length: auto
  checkpoint:
    directory: checkpoints/ppo/tune
    frequency_iters: 5
  evaluation:
    enabled: false
    episodes: 3
    report_path: reports/tune_best_trial_report.json
    render: false
    gif_path: gifs/tune_best_trial_episode.gif
    render_stride: 4
