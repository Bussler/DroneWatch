training:
  stop:
    iterations: 1
  ray:
    num_env_runners: 0
    num_envs_per_env_runner: 1
    num_learners: 0
    num_gpus_per_learner: 0
  ppo:
    gamma: 0.99
    lambda_: 0.95
    lr: 0.0003
    clip_param: 0.2
    entropy_coeff: 0.01
    vf_loss_coeff: 1.0
    train_batch_size_per_learner: 200
    minibatch_size: 64
    num_epochs: 1
    rollout_fragment_length: auto
  checkpoint:
    directory: checkpoints/ppo/smoke
    frequency_iters: 1
  evaluation:
    enabled: true
    episodes: 1
    report_path: reports/ppo_smoke_report.json
    render: true
    gif_path: gifs/ppo_smoke_episode.gif
    render_stride: 4
