services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.0
    container_name: dronewatch-mlflow
    command:
      - mlflow
      - server
      - --backend-store-uri
      - /mlflow/mlruns
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    ports:
      - "5000:5000"
    volumes:
      - ./outputs/mlruns:/mlflow/mlruns
      - ./artifacts/mlflow:/mlflow/artifacts
      # For Artifact mlflow logging
      - ${PWD}/outputs/mlruns:${PWD}/outputs/mlruns